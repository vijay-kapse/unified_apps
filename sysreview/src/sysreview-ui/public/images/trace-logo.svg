<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" role="img" aria-labelledby="title desc">
  <title id="title">TRACE logo</title>
  <desc id="desc">TRACE logo with a connected evidence path and research nodes.</desc>
  <defs>
    <linearGradient id="trace-bg" x1="22" y1="18" x2="120" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="trace-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#1e3a8a" flood-opacity=".18"/>
    </filter>
  </defs>
  <g filter="url(#trace-shadow)">
    <rect x="22" y="18" width="104" height="104" rx="26" fill="url(#trace-bg)"/>
    <path d="M42 88c16-31 36-45 63-48" fill="none" stroke="#dbeafe" stroke-width="8" stroke-linecap="round"/>
    <path d="M43 88h29v-30h30" fill="none" stroke="#ffffff" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="43" cy="88" r="8" fill="#ffffff"/>
    <circle cx="72" cy="58" r="8" fill="#bfdbfe"/>
    <circle cx="102" cy="58" r="8" fill="#ffffff"/>
    <path d="M55 100h43" stroke="#93c5fd" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="154" y="72" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">TRACE</text>
  <text x="156" y="101" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="15" font-weight="700" fill="#475569">Evidence tracking and curation</text>
</svg>
