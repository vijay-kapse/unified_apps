    <style>
      body {
        background: #dce2f0;
        color: #50586c;
        margin: 0px;
      }
      .main {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        text-align: center;
      }
      .header {
        margin-bottom: 3rem;
      }
      .container {
        display: flex;
        width: 100%;
        justify-content: space-between;
      }
      .left,
      .right {
        color: #50586c;
        padding: 5rem;
        width: 50%;
        display: flex;
        flex-direction: column;
        gap: 2rem;
        text-align: center;
        justify-content: center;
      }
      .left {
        border-right: 2px solid #50586c;
      }

      .logo {
        margin: auto;
        box-shadow: rgba(0, 0, 0, 0.16) 0px 10px 36px 0px,
          rgba(0, 0, 0, 0.06) 0px 0px 0px 1px;
      }

      .buttons {
        display: flex;
        justify-content: center;
        gap: 20px;
      }

      a {
        border-radius: 10px;
        padding: 0.5rem 1rem;
        cursor: pointer;
        text-decoration: none;
        font-size: 1.2rem;
        font-weight: 600;
        color: white;
        width: fit-content;
        display: flex;
        gap: 10px;
        align-items: center;
      }
      a:hover {
        border: 1px solid yellow;
        box-shadow: rgba(0, 0, 0, 0.35) 0px 5px 15px;
      }

      .checkout-btn {
        background: #50586c;
        color: #dce2f0;
        border: 1px solid white;
      }
      .read-the-docs-btn {
        background: transparent;
        color: #50586c;
        border: 1px solid #50586c;
      }
    </style>
  </head>
