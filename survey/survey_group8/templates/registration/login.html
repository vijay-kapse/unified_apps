{% extends "base.html" %}

{% block title %}Login{% endblock %}

{% block content %}
<main class="login-container">
  <h2 class="login-title">Log In</h2>
  <form method="get" action="{% url 'sso_login' %}" class="login-form">
    <p>This copied version uses a mock centralized login bridge for testing. Enter an email to simulate SSO.</p>
    <p><label>Email <input type="email" name="email" required></label></p>
    <input type="hidden" name="next" value="/survey/">
    <div class="button-group">
      <button type="submit">Continue with SSO</button>
      <a href="{% url 'home' %}" class="home-button">Home</a>
    </div>
  </form>
</main>
{% endblock %}
