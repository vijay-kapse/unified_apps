<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 140" role="img" aria-labelledby="title desc">
  <title id="title">ARGUS logo</title>
  <desc id="desc">ARGUS logo with a document lens for assisted reading.</desc>
  <defs>
    <linearGradient id="argus-bg" x1="22" y1="18" x2="124" y2="122" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="argus-accent" x1="48" y1="48" x2="103" y2="93" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#a7f3d0"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <filter id="argus-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity=".18"/>
    </filter>
  </defs>
  <g filter="url(#argus-shadow)">
    <rect x="22" y="18" width="104" height="104" rx="26" fill="url(#argus-bg)"/>
    <path d="M45 45h39l18 18v34H45z" fill="#f8fafc" opacity=".96"/>
    <path d="M84 45v18h18" fill="none" stroke="#cbd5e1" stroke-width="5" stroke-linejoin="round"/>
    <path d="M55 70h31M55 84h22" stroke="#64748b" stroke-width="5" stroke-linecap="round"/>
    <circle cx="80" cy="76" r="24" fill="none" stroke="url(#argus-accent)" stroke-width="8"/>
    <path d="M96 93l18 18" stroke="#a7f3d0" stroke-width="8" stroke-linecap="round"/>
  </g>
  <text x="154" y="72" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="42" font-weight="800" fill="#0f172a">ARGUS</text>
  <text x="156" y="101" font-family="Inter, Avenir Next, Arial, sans-serif" font-size="15" font-weight="700" fill="#475569">Assisted document reading</text>
</svg>
